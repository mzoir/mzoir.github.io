<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Hero</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: popins, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      padding: 2px 1% 2px;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #e63b68;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 45px;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .text {
      max-width: 560px;
    }

    .subtitle {
      color: #f4d13d;
      font-size: 14px;
      letter-spacing: 4px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 56px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    p {
      color: #aaa;
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 45px;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 35px;
      flex-wrap: wrap;
    }

    .btn {
      background: #20c463;
      color: #fff;
      padding: 20px 36px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(32, 196, 99, 0.35);
    }

    .email {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .portrait {
      position: absolute;
      right: 8%;
      bottom: 0;
      height: 85%;
      width: 42%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.05)),
                  url("https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=900&q=80");
      background-size: cover;
      background-position: center;
      filter: grayscale(100%);
      opacity: 0.85;
      border-radius: 10px;
    }
    .circle {
      position: absolute;
      right: 10%;
      bottom: 12%;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 2px dashed #777;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      font-weight: 900;
      transform: rotate(-15deg);
    }

    .shape {
      position: absolute;
      width: 18px;
      height: 18px;
      z-index: 1;
    }

    .pink {
      background: #e63b68;
      top: 18%;
      left: 52%;
      transform: rotate(45deg);
    }

    .yellow {
      background: #ffd52e;
      top: 18%;
      right: 6%;
      transform: rotate(12deg);
    }

    .blue {
      background: #1b5cff;
      right: 5%;
      bottom: 28%;
    }

    @media (max-width: 900px) {
      nav {
        display: none;
      }

      .content {
        align-items: flex-start;
        padding-top: 80px;
      }

      h1 {
        font-size: 40px;
      }

      p {
        font-size: 17px;
      }

      .portrait {
        opacity: 0.25;
        width: 100%;
        right: 0;
      }

      .circle {
        display: none;
      }
    }

    @media (max-width: 500px) {
      .hero {
        padding: 25px 5%;
      }

      h1 {
        font-size: 34px;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <header>
      <div class="logo">zakariae</div>

      <nav>
        <a href="#">RECENT WORK</a>
        <a href="#">CONTACT</a>
        <a href="#">EN⌄</a>
      </nav>
    </header>

    <div class="shape pink"></div>
    <div class="shape yellow"></div>
    <div class="shape blue"></div>

    <div class="portrait"></div>

    <div class="content">
      <div class="text">
        <div class="subtitle">DESIGNER & WEB DEVELOPER</div>

        <h1>
          Hi, I am a designer<br>
          expert in web<br>
          development
        </h1>

        <p>
          My mission is to design and develop a website that
          you and your audience love.
        </p>

        <div class="buttons">
          <a href="#" class="btn">💬 LET'S CHAT ON WHATSAPP</a>
          <a href="#" class="email">OR SEND ME AN EMAIL</a>
        </div>
      </div>
    </div>

    <div class="circle">W</div>
  </section>
</body>
</html>
