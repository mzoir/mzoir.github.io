<script>

// FIREBASE PROJECT

const projectId = "plmo-c5ddd";
const apiKey = "AIzaSyDPxhzmTie_ysPIMyB9Ivix5BHMetyZWxs";

// FIRESTORE DOC
// change if your credentials are stored elsewhere

const firestoreUrl =
`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/iptv/config?key=${apiKey}`;

async function getCredentials(){

    try{

        const res = await fetch(firestoreUrl);
        const data = await res.json();

        console.log(data);

        if(!data.fields){
            throw "No firestore data";
        }

        return {
            username:
                data.fields.username.stringValue,
            password:
                data.fields.password.stringValue
        };

    }catch(e){

        console.log(e);
        return null;
    }
}

async function loadChannels(){

    try{

        // GET USERNAME + PASSWORD FROM FIREBASE

        const creds = await getCredentials();

        if(!creds){
            throw "Credentials not found";
        }

        const username = creds.username;
        const password = creds.password;

        // IPTV API

        const url =
`http://ugeen.live:8080/player_api.php?username=${username}&password=${password}&action=get_live_streams`;

        console.log(url);

        const response =
            await fetch(url);

        const data =
            await response.json();

        const channels =
            data.filter(ch =>
                ch.name &&
                (
                    ch.name.toLowerCase().includes("bein sports") ||
                    ch.name.toLowerCase().includes("bein")
                )
            );

        document.getElementById(
            "loader"
        ).style.display="none";

        const container =
            document.getElementById(
                "channels"
            );

        channels.forEach(ch=>{

            const card =
                document.createElement(
                    "div"
                );

            card.className="card";

            card.onclick = ()=>{

                window.location.href =
                `be7.html?stream_id=${ch.stream_id}`;
            };

            card.innerHTML = `
<div class="icon-box">
${
ch.stream_icon
? `<img src="${ch.stream_icon}">`
: `📺`
}
</div>

<div class="channel-name">
${ch.name}
</div>

<div class="play">▶</div>
`;

            container.appendChild(card);
        });

    }catch(e){

        document.getElementById(
            "loader"
        ).style.display="none";

        document.getElementById(
            "channels"
        ).innerHTML =
        "<p style='color:white;text-align:center;'>Failed to load channels</p>";

        console.log(e);
    }
}

loadChannels();

</script>
