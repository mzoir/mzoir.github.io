<script>

const projectId = "plmo-c5ddd";
const apiKey = "AIzaSyDPxhzmTie_ysPIMyB9Ivix5BHMetyZWxs";

const firestoreUrl =
`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/iptv/config?key=${apiKey}`;

function showError(msg){
    document.getElementById("loader").style.display="none";
    document.getElementById("channels").innerHTML =
        `<p style="color:white;text-align:center">${msg}</p>`;
}

async function getCredentials(){

    try{
        const res = await fetch(firestoreUrl);
        const data = await res.json();

        console.log("Firestore:", data);

        if(!data.fields){
            return null;
        }

        return {
            username: data.fields.username.stringValue,
            password: data.fields.password.stringValue
        };

    }catch(e){
        console.log("Firestore error:", e);
        return null;
    }
}

async function loadChannels(){

    try{

        const creds = await getCredentials();

        if(!creds){
            return showError("❌ Firebase credentials not loaded");
        }

        const url =
`http://ugeen.live:8080/player_api.php?username=${creds.username}&password=${creds.password}&action=get_live_streams`;

        console.log("IPTV URL:", url);

        const response = await fetch(url);
        const data = await response.json();

        if(!Array.isArray(data)){
            return showError("❌ IPTV API failed");
        }

        const channels = data.filter(ch =>
            ch.name &&
            ch.name.toLowerCase().includes("bein")
        );

        document.getElementById("loader").style.display="none";

        const container = document.getElementById("channels");

        channels.forEach(ch => {

            const card = document.createElement("div");
            card.className = "card";

            card.onclick = () => {
                window.location.href =
                `be7.html?stream_id=${ch.stream_id}`;
            };

            card.innerHTML = `
<div class="icon-box">
${ch.stream_icon
? `<img src="${ch.stream_icon}">`
: "📺"}
</div>

<div class="channel-name">${ch.name}</div>
<div class="play">▶</div>
`;

            container.appendChild(card);
        });

    }catch(e){
        console.log("Main error:", e);
        showError("❌ Page crashed (check console)");
    }
}

loadChannels();

</script>
