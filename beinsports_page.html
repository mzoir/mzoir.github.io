<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bein Sports</title>

<style>
body{margin:0;font-family:Arial;background:#673AB7}
.navbar{background:white;display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom-left-radius:30px;border-bottom-right-radius:30px;box-shadow:0 4px 10px rgba(0,0,0,.15);position:sticky;top:0;z-index:10}
.navbar .title{font-size:20px;font-weight:bold;color:#673AB7}
.navbar button{border:none;background:none;font-size:20px;cursor:pointer}
.loader{border:5px solid #eee;border-top:5px solid #673AB7;border-radius:50%;width:45px;height:45px;animation:spin 1s linear infinite;margin:50px auto}
@keyframes spin{100%{transform:rotate(360deg)}}
.container{padding:12px}
.card{background:white;border-radius:18px;padding:14px;margin-bottom:12px;display:flex;align-items:center;cursor:pointer;box-shadow:0 5px 10px rgba(0,0,0,.08)}
.icon-box{width:55px;height:55px;border-radius:14px;overflow:hidden;background:#eee;display:flex;justify-content:center;align-items:center}
.icon-box img{width:100%;height:100%;object-fit:cover}
.channel-name{flex:1;margin-left:12px;font-weight:600}
.play{font-size:22px;color:#673AB7}
</style>
</head>

<body>

<div class="navbar">
  <button onclick="history.back()">⬅</button>
  <div class="title">Bein Sports</div>
  <button onclick="location.reload()">🔄</button>
</div>

<div id="loader" class="loader"></div>
<div id="channels" class="container"></div>

<script>
const projectId = "plmo-c5ddd";
const apiKey = "AIzaSyDPxhzmTie_ysPIMyB9Ivix5BHMetyZWxs";

const firestoreUrl =
`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/iptv/config?key=${apiKey}`;

function showError(msg){
  const loader = document.getElementById("loader");
  const channels = document.getElementById("channels");

  if (loader) loader.style.display = "none";
  if (channels) {
    channels.innerHTML =
      `<p style="color:white;text-align:center">${msg}</p>`;
  } else {
    alert(msg);
  }
}

async function getCredentials(){
  try{
    const res = await fetch(firestoreUrl);
    const data = await res.json();

    if(!data.fields) return null;

    return {
      username: data.fields.username.stringValue,
      password: data.fields.password.stringValue
    };
  }catch(e){
    console.log("Firestore error:", e);
    return null;
  }
}

async function loadChannels(){
  try{
    const creds = await getCredentials();

    if(!creds){
      return showError("Firebase credentials not loaded");
    }

    const response = await fetch(
      "https://58.mzliker99.workers.dev/?action=get_live_streams"
    );

    const data = await response.json();

    if(!Array.isArray(data)){
      return showError("IPTV API failed");
    }

    const channels = data.filter(ch =>
      ch.name && ch.name.toLowerCase().includes("bein")
    );

    const loader = document.getElementById("loader");
    const container = document.getElementById("channels");

    if (loader) loader.style.display = "none";
    if (!container) return;

    channels.forEach(ch => {
      const card = document.createElement("div");
      card.className = "card";

      card.onclick = () => {
        const streamUrl =
          `http://ugeen.live:8080/${creds.username}/${creds.password}/${ch.stream_id}`;
     function openInVLC(streamUrl) {
    // Construct the custom VLC protocol link
    const vlcUrl = `vlc://${streamUrl}`;
    
    // Create a hidden anchor element
    const link = document.createElement('a');
    link.href = vlcUrl;
    
    // Append, click, and remove the link
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
        const content =
          `#EXTM3U\n#EXTINF:-1,${ch.name}\n${streamUrl}\n`;

        const blob = new Blob([content], {
          type: "audio/x-mpegurl"
        });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${ch.name}.m3u`;
        a.click();

        URL.revokeObjectURL(a.href);
      };

      card.innerHTML = `
        <div class="icon-box">
          ${ch.stream_icon ? `<img src="${ch.stream_icon}">` : "📺"}
        </div>
        <div class="channel-name">${ch.name}</div>
        <div class="play">VLC</div>
      `;

      container.appendChild(card);
    });

  }catch(e){
    console.log("Main error:", e);
    showError("Page crashed. Check console.");
  }
}

loadChannels();
</script>

</body>
</html>
