<script>

const projectId = "plmo-c5ddd";
const apiKey = "AIzaSyDPxhzmTie_ysPIMyB9Ivix5BHMetyZWxs";

const firestoreUrl =
`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/iptv/config?key=${apiKey}`;

function showError(msg){
    document.getElementById("loader").style.display="none";
    document.getElementById("channels").innerHTML =
        `<p style="color:white;text-align:center">${msg}</p>`;
}

async function getCredentials(){

    try{

        const res = await fetch(firestoreUrl);
        const data = await res.json();

        if(!data.fields){
            return null;
        }

        return {
            username: data.fields.username.stringValue,
            password: data.fields.password.stringValue
        };

    }catch(e){
        console.log(e);
        return null;
    }
}

async function loadChannels(){

    try{

        const creds = await getCredentials();

        if(!creds){
            return showError("Firebase credentials not loaded");
        }

        const response = await fetch(
          "https://58.mzliker99.workers.dev/?action=get_live_streams"
        );

        const data = await response.json();

        if(!Array.isArray(data)){
            return showError("IPTV API failed");
        }

        const channels = data.filter(ch =>
            ch.name &&
            ch.name.toLowerCase().includes("bein")
        );

        document.getElementById("loader").style.display = "none";

        const container =
          document.getElementById("channels");

        channels.forEach(ch => {

            const card =
              document.createElement("div");

            card.className = "card";

            card.onclick = () => {

                const streamUrl =
                  `http://ugeen.live:8080/${creds.username}/${creds.password}/${ch.stream_id}`;

                console.log(streamUrl);

                try {

                    window.location.href =
                      `vlc://${streamUrl}`;

                    setTimeout(() => {
                        window.location.href =
                          streamUrl;
                    }, 1500);

                } catch(e){

                    window.location.href =
                      streamUrl;
                }
            };

            card.innerHTML = `
<div class="icon-box">
${ch.stream_icon
 ? `<img src="${ch.stream_icon}">`
 : "📺"}
</div>

<div class="channel-name">
${ch.name}
</div>

<div class="play">📺</div>
`;

            container.appendChild(card);
        });

    }catch(e){

        console.log(e);

        showError(
          "Page crashed (check console)"
        );
    }
}

loadChannels();

</script>
