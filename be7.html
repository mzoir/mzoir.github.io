<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: 100vh;
      background: black;
    }

    #msg {
      color: white;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<video id="video" controls autoplay></video>
<div id="msg">Loading...</div>

<script>
const worker = "https://58.mzliker99.workers.dev";

const params = new URLSearchParams(window.location.search);
const streamId = params.get("stream_id");
const server = params.get("server") || "config";

const msg = document.getElementById("msg");
const video = document.getElementById("video");

if (!streamId) {
  msg.innerText = "Missing stream_id";
} else {
  const streamUrl =
    `${worker}/play?server=${server}&stream_id=${streamId}`;

  console.log("Stream:", streamUrl);

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      msg.style.display = "none";
      video.play();
    });

    hls.on(Hls.Events.ERROR, function () {
      msg.innerText = "Player error";
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = streamUrl;
    video.addEventListener("loadedmetadata", function () {
      msg.style.display = "none";
      video.play();
    });
  } else {
    msg.innerText = "HLS not supported";
  }
}
</script>

</body>
</html>
